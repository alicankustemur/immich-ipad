<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Photo Frame</title>
<style>
* {
    margin: 0;
    padding: 0;
}
html, body {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: Helvetica, Arial, sans-serif;
}
#current {
    position: absolute;
}
#info {
    position: absolute;
    right: 48px;
    bottom: 48px;
    z-index: 10;
    color: #fff;
    text-align: right;
    text-shadow: 0 1px 3px #000, 0 0 8px #000, 0 0 16px rgba(0,0,0,0.5);
    opacity: 0;
    -webkit-transition: opacity 0.8s ease-in;
    transition: opacity 0.8s ease-in;
}
#info.visible {
    opacity: 1;
}
#info-weather {
    font-size: 48px;
}
#info-weather img {
    width: 48px;
    height: auto;
    vertical-align: middle;
}
#info-clock {
    font-size: 84px;
    font-weight: bold;
}
#info-date {
    font-size: 48px;
    font-weight: bold;
}
#info-city {
    font-size: 40px;
    margin-top: 2px;
}
#info-map {
    display: block;
    width: 200px;
    height: 150px;
    margin-top: 6px;
    border: 2px solid rgba(255,255,255,0.7);
    border-radius: 4px;
    float: right;
}
#status {
    position: absolute;
    top: 50%;
    left: 50%;
    -webkit-transform: translate(-50%, -50%);
    transform: translate(-50%, -50%);
    color: #888;
    font-size: 28px;
    text-align: center;
    z-index: 20;
}
#status.hidden {
    display: none;
}
</style>
</head>
<body>
<img id="current" alt="" style="display:none">
<div id="info">
    <div id="info-weather"></div>
    <div id="info-clock"></div>
    <div id="info-city"></div>
    <div id="info-date"></div>
    <img id="info-map" alt="" style="display:none">
</div>
<div id="status">Sunucuya baglaniyor...</div>
<script>
(function() {
    var interval = {{.Interval}} * 1000;
    var showMap = {{.ShowMap}};
    var current = document.getElementById("current");
    var info = document.getElementById("info");
    var infoWeather = document.getElementById("info-weather");
    var infoClock = document.getElementById("info-clock");
    var infoDate = document.getElementById("info-date");
    var infoCity = document.getElementById("info-city");
    var infoMap = document.getElementById("info-map");
    var status = document.getElementById("status");
    var hasImage = false;
    var watchdog = null;

    function resetWatchdog() {
        if (watchdog) clearTimeout(watchdog);
        watchdog = setTimeout(function() {
            showNext();
        }, 60000);
    }

    function updateClock() {
        var now = new Date();
        var h = now.getHours();
        var m = now.getMinutes();
        infoClock.innerHTML = (h < 10 ? "0" : "") + h + ":" + (m < 10 ? "0" : "") + m;
    }
    updateClock();
    setInterval(updateClock, 30000);

    var showWeather = {{.ShowWeather}};

    function fetchWeather() {
        if (!showWeather) return;
        var xhr = new XMLHttpRequest();
        xhr.open("GET", "/weather?t=" + new Date().getTime(), true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState !== 4 || xhr.status !== 200) return;
            try {
                var w = eval("(" + xhr.responseText + ")");
                infoWeather.innerHTML = "<img src=\"" + w.icon + "\" alt=\"\"> " + w.temp + "\u00B0C";
            } catch(e) {}
        };
        xhr.send(null);
    }
    fetchWeather();
    setInterval(fetchWeather, 900000);

    function positionImage(img, natW, natH) {
        var winW = window.innerWidth || document.documentElement.clientWidth;
        var winH = window.innerHeight || document.documentElement.clientHeight;
        if (!natW || !natH) return;

        var scale = Math.min(1, winW / natW, winH / natH);
        var w = Math.round(natW * scale);
        var h = Math.round(natH * scale);
        var x = Math.round((winW - w) / 2);
        var y = Math.round((winH - h) / 2);

        img.style.left = x + "px";
        img.style.top = y + "px";
        img.style.width = w + "px";
        img.style.height = h + "px";
    }

    function retryLater() {
        if (!hasImage) {
            status.className = "";
        }
        setTimeout(showNext, interval);
    }

    function showNext() {
        resetWatchdog();
        var xhr = new XMLHttpRequest();
        var xhrDone = false;
        var xhrTimer = setTimeout(function() {
            if (!xhrDone) {
                xhrDone = true;
                xhr.abort();
                retryLater();
            }
        }, 15000);
        xhr.open("GET", "/random?t=" + new Date().getTime(), true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState !== 4 || xhrDone) return;
            xhrDone = true;
            clearTimeout(xhrTimer);
            if (xhr.status !== 200) {
                retryLater();
                return;
            }
            var item;
            try {
                item = eval("(" + xhr.responseText + ")");
            } catch(e) {
                retryLater();
                return;
            }
            if (!item || !item.id) {
                retryLater();
                return;
            }
            status.className = "hidden";

            var img = new Image();
            img.onload = function() {
                info.className = "";
                current.style.display = "";
                current.src = img.src;
                current.onload = function() {
                    hasImage = true;
                    var natW = current.naturalWidth || current.width;
                    var natH = current.naturalHeight || current.height;
                    positionImage(current, natW, natH);
                    infoDate.innerHTML = item.date || "";
                    infoCity.innerHTML = item.city || "";
                    if (showMap && item.lat && item.lon) {
                        infoMap.src = "/map?lat=" + item.lat + "&lon=" + item.lon;
                        infoMap.style.display = "";
                    } else {
                        infoMap.style.display = "none";
                    }
                    setTimeout(function() {
                        info.className = "visible";
                    }, 500);
                    setTimeout(showNext, interval);
                };
            };
            img.onerror = function() {
                retryLater();
            };
            img.src = "/photo?id=" + item.id + "&t=" + new Date().getTime();
        };
        xhr.send(null);
    }

    showNext();
})();
</script>
</body>
</html>
